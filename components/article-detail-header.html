<!--
Component: Article Detail Header
Used in: article-detail.html
How to use:
- Use on article detail pages before the article body.
- Set [ARTICLE_TITLE] and [ARTICLE_META] (e.g., author, date, read time).
-->
<header class="mx-auto max-w-[720px] px-6 pt-12">
  <h1 class="text-4xl font-semibold mt-12 mb-6">[ARTICLE_TITLE]</h1>
  <p class="text-sm text-gray-500 mb-8">[ARTICLE_META]</p>
</header>
