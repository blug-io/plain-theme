<!--
Component: Inline Tag List
Used in: tags.html
How to use:
- Render each tag as an inline list item inside this wrapping <ul>.
- Keep flex-wrap to allow responsive wrapping on smaller screens.
-->
<section>
  <ul class="flex flex-wrap items-center gap-x-6 gap-y-4">
    <li><a href="[TAG_URL]" class="underline decoration-black decoration-wavy underline-offset-2">[TAG_NAME]</a></li>
  </ul>
</section>
