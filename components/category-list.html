<!--
Component: Category List
Used in: categories.html
How to use:
- Render one list item per category.
- Replace [CATEGORY_NAME], [CATEGORY_URL], and [COUNT].
-->
<section>
  <ul>
    <li class="mb-6"><a href="[CATEGORY_URL]" class="underline decoration-black decoration-wavy underline-offset-2">[CATEGORY_NAME]</a> ([COUNT])</li>
  </ul>
</section>
