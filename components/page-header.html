<!--
Component: Page Header
Used in: all pages for page title + optional supporting text
How to use:
- Provide [PAGE_TITLE].
- Optionally provide [PAGE_SUBTITLE_OR_META]; remove the <p> when not needed.
- Keep spacing classes unchanged for visual consistency across pages.
-->
<header class="mx-auto max-w-[720px] px-6 pt-12">
  <h1 class="text-4xl font-semibold mt-12 mb-6">[PAGE_TITLE]</h1>
  <p class="mb-6">[PAGE_SUBTITLE_OR_META]</p>
</header>
